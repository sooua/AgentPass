# Optional dev backends for FUTURE integration. The MVP does NOT require these —
# it runs fully local with node:sqlite + AES-256-GCM. Start these only when you
# begin wiring OpenBaoProvider / InfisicalProvider (see docs/open-source-reuse.md).
# License review is a TODO before any commercial distribution.
services:
  openbao:
    image: openbao/openbao:latest # TODO(legal): MPL-2.0 — confirm terms
    profiles: ["backends"]
    cap_add: ["IPC_LOCK"]
    environment:
      BAO_DEV_ROOT_TOKEN_ID: dev-root-token # dev only, never in prod
      BAO_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]

  infisical:
    image: infisical/infisical:latest # TODO(legal): mixed license — verify
    profiles: ["backends"]
    ports: ["8080:8080"]
    environment:
      ENCRYPTION_KEY: dev-only-change-me
